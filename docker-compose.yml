services:
  mongo1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amazonas-mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amazonas-mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amazonas-mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo-setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amazonas-mongo-setup
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/scripts/init-replica.sh"]

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
